name: ulster38
channels:
  - conda-forge
dependencies:
  - python=3.8
  - pip

  # GUI + imaging
  - pyqt=5
  - matplotlib
  - seaborn
  - pillow
  - opencv

  # Numeric/science stack
  - numpy
  - scipy
  - pandas
  - h5py
  - scikit-image
  - scikit-learn
  - pyfai

  # gRPC/protobuf line that still supports Python 3.8
  - grpcio=1.70.*
  - grpcio-tools=1.70.*
  - protobuf=5.29.*

  # Runtime helpers
  - click
  - requests
  - tomli

  # Dev/test tools
  - pytest
  - black
  - flake8
  - isort
  - coverage
  - pre-commit

  # NOTE:
  # - pypixet / pypxproc are not distributed via conda.
  # - They must come from your PIXet SDK installation path.
